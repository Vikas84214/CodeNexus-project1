kind = "web"
previewPath = "/"
title = "CodeNexus"
version = "1.0.0"
id = "artifacts/codenexus"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23586

[services.development]
run = "pnpm --filter @workspace/codenexus run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/codenexus", "run", "build" ]
publicDir = "artifacts/codenexus/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23586"
BASE_PATH = "/"
